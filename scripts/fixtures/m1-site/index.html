<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>anchortree M=1 fixture</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        color: #1a1a1a;
      }
      .card {
        max-width: 32rem;
        padding: 1rem 1.25rem;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      button {
        padding: 0.5rem 0.9rem;
        border-radius: 6px;
        border: 1px solid #888;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">anchortree replay fixture</h1>
      <div class="card" id="card">
        <p id="intro">A tiny self-contained page reached entirely from a recorded HAR.</p>
        <button id="buy-now" type="button" onclick="window.__atRerender()">Buy now</button>
        <p id="status" role="status">ready</p>
      </div>
    </main>
    <script>
      // Structural re-render, inlined in the page body so it replays
      // deterministically from the HAR (no network touched on replay).
      //
      // __atRerender rebuilds the card's children as brand-new DOM nodes with
      // IDENTICAL roles + text. Their backendNodeIds change; their fingerprints
      // do not. This is the exact framework-re-render case: anchortree rebinds
      // the eids across the swap with zero model calls (diff.rebound). A
      // selector cache keyed on a DOM hash (e.g. Stagehand) would see the hash
      // drift here and fall back to the LLM. The card markup below is kept
      // byte-identical to the static markup above so the fingerprints match.
      window.__atRerender = function () {
        var card = document.getElementById("card");
        if (!card) return false;
        card.innerHTML =
          '<p id="intro">A tiny self-contained page reached entirely from a recorded HAR.</p>' +
          '<button id="buy-now" type="button" onclick="window.__atRerender()">Buy now</button>' +
          '<p id="status" role="status">ready</p>';
        return true;
      };
    </script>
  </body>
</html>
